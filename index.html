<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Ngữ Pháp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Quản Lý Ngữ Pháp</h1>

        <!-- Form Thêm / Sửa -->
        <div class="card">
            <h2 id="formTitle">Thêm Cấu Trúc Mới</h2>
            <form id="grammarForm">
                <input type="hidden" id="entryId">
                <div class="form-group">
                    <label for="lessonInput">Bài học (Lesson):</label>
                    <input type="text" id="lessonInput" placeholder="Ví dụ: Lesson 1, Bài 2..." required>
                </div>
                <div class="form-group">
                    <label for="grammarInput">Cấu trúc ngữ pháp:</label>
                    <input type="text" id="grammarInput" placeholder="Ví dụ: A 比 B + Adj" required>
                </div>
                <div class="form-group">
                    <label for="meaningInput">Ý nghĩa / Cách dùng:</label>
                    <textarea id="meaningInput" rows="3" placeholder="Giải thích ý nghĩa..." required></textarea>
                </div>
                <div class="form-buttons">
                    <button type="submit" id="submitBtn" class="btn btn-primary">Lưu Lại</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary hidden">Hủy</button>
                </div>
            </form>
        </div>

        <!-- Bộ Lọc & Tìm Kiếm -->
        <div class="filter-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Tìm kiếm cấu trúc hoặc ý nghĩa...">
            </div>
            <div class="filter-box">
                <!-- Dropdown bài học tự động cập nhật động ở đây -->
                <select id="lessonFilter">
                    <option value="">Tất cả bài học</option>
                </select>
            </div>
        </div>

        <!-- Công cụ Import / Export -->
        <div class="tools-section">
            <button id="exportBtn" class="btn btn-success">Xuất bản (Export JSON)</button>
            <label for="importFile" class="btn btn-info">Nhập bản lưu (Import JSON)</label>
            <input type="file" id="importFile" accept=".json" style="display: none;">
        </div>

        <!-- Danh Sách Hiển Thị -->
        <div class="list-section">
            <h2>Danh Sách Ngữ Pháp</h2>
            <div id="grammarList" class="grammar-list">
                <!-- Data đổ vào đây từ script -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
